<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG System - Simple Test</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Multi-Agent RAG System</h1>

    <div class="input-section">
        <label for="query">Enter your question:</label>
        <textarea id="query" placeholder="e.g., What are some interesting facts about cats?"></textarea>
    </div>

    <button id="submitBtn" onclick="askQuestion()">Ask Question</button>

    <div id="loading" class="loading">
        <p>Processing your question...</p>
    </div>

    <div id="error" class="error hidden"></div>

    <div id="results" class="results hidden">
        <h2>Answer:</h2>
        <div id="answer" class="answer"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
